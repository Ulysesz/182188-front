<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product preview card component</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
 <link rel="stylesheet" href="styles/style.css">
</head>
<body>

  <article>
    <div class="cont-imagenes">
      <img 
      class="pc-perfume" 
      src="images/image-product-desktop.jpg" 
      alt="Foto de perfume">
      <img 
      class="mobile-perfume" 
      src="images/image-product-mobile.jpg" 
      alt="Foto de perfume para mobile">
    </div>
    
    <div class="cont-textos">
      <h3>Perfume</h3>
      <h2>Gabrielle Essence Eau De Parfum</h2>
      <p class="descripcion">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
       Perfumer-Creator for the House of CHANEL.</p>
       <div class="cont-precios">
        <p class="precio-oferta">$149.99</p>
        <s class="precio-real">$169.99</s>
       </div>
       <button><img src="./images/icon-cart.svg" alt="Icono de carrito">Add to Cart</button>
    </div>
  </article> 
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
