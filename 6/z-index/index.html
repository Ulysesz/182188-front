<!DOCTYPE html>
<html lang="en">

<body>
    
    <h1> Z-index </h1>

    <article>
        <h2> Z-index, quuien va adelante? </h2>
        <p> Cuando hay varios elementos posicionados en lugares similares, se superponen, z-index decide cual se ve por encima. Mayor numero = más al frente. Solo funciona con position distinto de static. </p>
        <div class="stack">
            <div class="capa capa-1"> Z-index: 1 </div>
            <div class="capa capa-2"> Z-index: 3 </div>
            <div class="capa capa-3"> Z-index: 2 </div>

        </div>
    </article>
</body>
</html>
