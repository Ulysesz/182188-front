<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Tema 3: align-items</h1>

    <h2>align-items: flex-stretch</h2>

    <div class="flex-container ai-stretch">
      <div class="flex-item">1</div>
      <div class="flex-item">2</div>
      <div class="flex-item">3</div>
    </div>

    <h2>align-items: flex-start</h2>

    <div class="flex-container ai-start">
      <div class="flex-item">1</div>
      <div class="flex-item">2</div>
      <div class="flex-item">3</div>
    </div>

    <h2>align-items: flex-end</h2>

    <div class="flex-container ai-end">
      <div class="flex-item">1</div>
      <div class="flex-item">2</div>
      <div class="flex-item">3</div>
    </div>

    <h2>align-items: flex-center</h2>

    <div class="flex-container ai-center">
      <div class="flex-item">1</div>
      <div class="flex-item">2</div>
      <div class="flex-item">3</div>
    </div>

    <h2>align-items: baseline</h2>

    <div class="flex-container ai-baseline">
      <div class="flex-item">1</div>
      <div class="flex-item item-padded">2</div>
      <div class="flex-item">3</div>
    </div>
  </body>
</html>
